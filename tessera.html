<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Club Napoli Romazzurra</title>

<link rel="stylesheet" href="card.css">

<meta name="theme-color" content="#0b2d5c">

</head>

<body>

<div class="card">

    <!-- HEADER -->

    <header class="card-header">

        <div class="logo-area">

            <img src="logo40.jpeg"
                 class="logo40"
                 alt="40° anniversario">

        </div>

        <div class="title-area">

            <h1>CLUB NAPOLI ROMAZZURRA</h1>

            <h2>TESSERA SOCIO UFFICIALE</h2>

            <p>
                Club riconosciuto dall'Associazione Italiana Napoli Club
            </p>

        </div>

        <div class="anniversary">

            <span>1986</span>

            <span>2026</span>

            <strong>40°</strong>

            <small>ANNIVERSARIO</small>

        </div>

    </header>

    <!-- CONTENUTO -->

    <main class="member">

        <!-- FOTO -->

        <section class="photo-box">

            <img
                id="foto"
                class="photo"
                src=""
                alt="Socio">

        </section>

        <!-- DATI -->

        <section class="info-box">

            <h3 id="nome"></h3>

            <div
                id="qualifica"
                class="role">
            </div>

            <div class="row">

                <label>Numero Tessera</label>

                <span id="numero"></span>

            </div>

            <div class="row">

                <label>Data Iscrizione</label>

                <span id="iscrizione"></span>

            </div>

            <div class="row">

                <label>Validità</label>

                <span id="validita"></span>

            </div>

        </section>

        <!-- QR -->

        <section class="qr-box">

            <div class="qr-title">

                VERIFICA<br>TESSERA

            </div>

            <img
                id="qr"
                class="qr"
                src=""
                alt="QR">

        </section>

    </main>

    <!-- FOOTER -->

    <footer>

        IDENTITÀ • PASSIONE • APPARTENENZA

    </footer>

</div>
<script>

fetch("soci.json")

.then(response => {

    if(!response.ok){

        throw new Error("Errore nel caricamento del file soci.json");

    }

    return response.json();

})

.then(soci => {

    const params = new URLSearchParams(window.location.search);

    const id = params.get("id") || "CNR-260001";

    const socio = soci.find(s => s.id === id);

    if(!socio){

        document.body.innerHTML = `
        <div style="padding:40px;font-family:Arial;text-align:center">
            <h1>Tessera non trovata</h1>
            <p>Il socio richiesto non esiste.</p>
        </div>`;

        return;

    }

    document.getElementById("nome").textContent =
        socio.nome + " " + socio.cognome;

    document.getElementById("qualifica").textContent =
        socio.qualifica;

    document.getElementById("numero").textContent =
        socio.numero;

    document.getElementById("iscrizione").textContent =
        socio.iscrizione;

    document.getElementById("validita").textContent =
        socio.validita;

    document.getElementById("foto").src =
        socio.foto;

    document.getElementById("foto").alt =
        socio.nome + " " + socio.cognome;

    const urlVerifica =
        "https://giannicaggiano-dotcom.github.io/clubnapoliromazzurra/verifica.html?id="
        + encodeURIComponent(id);

    document.getElementById("qr").src =
        "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data="
        + encodeURIComponent(urlVerifica);

})

.catch(error => {

    console.error(error);

    document.body.innerHTML = `
    <div style="padding:40px;font-family:Arial;text-align:center">

        <h1>Errore</h1>

        <p>Impossibile caricare i dati del socio.</p>

    </div>`;

});

</script>
</body>

</html>
