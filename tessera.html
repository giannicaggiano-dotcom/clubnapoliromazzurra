<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Club Napoli Romazzurra</title>

<link rel="stylesheet" href="card.css">

<meta name="theme-color" content="#0b2d5c">

</head>

<body>

<div class="card">

    <!-- HEADER -->

    <header class="card-header">

        <div class="logo-area">

            <img src="logo40.jpeg"
                 class="logo40"
                 alt="40° anniversario">

        </div>

        <div class="title-area">

            <h1>CLUB NAPOLI ROMAZZURRA</h1>

            <h2>TESSERA SOCIO UFFICIALE</h2>

            <p>
                Club riconosciuto dall'Associazione Italiana Napoli Club
            </p>

        </div>

        <div class="anniversary">

            <span>1986</span>

            <span>2026</span>

            <strong>40°</strong>

            <small>ANNIVERSARIO</small>

        </div>

    </header>

    <!-- CONTENUTO -->

    <main class="member">

        <!-- FOTO -->

        <section class="photo-box">

            <img
                id="foto"
                class="photo"
                src=""
                alt="Socio">

        </section>

        <!-- DATI -->

        <section class="info-box">

            <h3 id="nome"></h3>

            <div
                id="qualifica"
                class="role">
            </div>

            <div class="row">

                <label>Numero Tessera</label>

                <span id="numero"></span>

            </div>

            <div class="row">

                <label>Data Iscrizione</label>

                <span id="iscrizione"></span>

            </div>

            <div class="row">

                <label>Validità</label>

                <span id="validita"></span>

            </div>

        </section>

        <!-- QR -->

        <section class="qr-box">

            <div class="qr-title">

                VERIFICA<br>TESSERA

            </div>

            <img
                id="qr"
                class="qr"
                src=""
                alt="QR">

        </section>

    </main>

    <!-- FOOTER -->

    <footer>

        IDENTITÀ • PASSIONE • APPARTENENZA

    </footer>

</div>

</body>

</html>
